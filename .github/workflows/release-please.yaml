on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          # this assumes that you have created a personal access token
          # (PAT) and configured it as a GitHub action secret named
          # `MY_RELEASE_PLEASE_TOKEN` (this secret name is not important).
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          # this is a built-in strategy in release-please, see "Action Inputs"
          # for more options
          release-type: simple

      - name: Check for open API version pull request
        id: check_version_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base: 'main',
              per_page: 100,
            });

            const hasOpenVersionPR = pulls.some((pr) =>
              pr.title.startsWith('chore: update api version to')
            );

            core.info(`Open API version PR found: ${hasOpenVersionPR}`);
            core.setOutput('has_open_version_pr', hasOpenVersionPR ? 'true' : 'false');

      - name: Checkout repository for sync
        if: steps.check_version_pr.outputs.has_open_version_pr != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

      - name: Sync main into develop
        if: steps.check_version_pr.outputs.has_open_version_pr != 'true'
        uses: repo-sync/pull-request@v2
        with:
          github_token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          source_branch: main
          destination_branch: develop
          pr_title: "chore: sync main into develop"
          pr_body: |
            Auto-generated PR to sync changes from `main` into `develop`.
          pr_label: chore
