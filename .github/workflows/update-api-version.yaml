name: Update Version and Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from changelog or tags
        id: resolve_version
        run: |
          VERSION=""

          if [ -f CHANGELOG.md ]; then
            VERSION=$(grep -oP '\[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -1 || true)
          fi

          if [ -z "$VERSION" ]; then
            VERSION=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1 | sed 's/^v//' || true)
          fi

          if [ -z "$VERSION" ]; then
            VERSION=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1 || true)
          fi

          if [ -z "$VERSION" ]; then
            echo "No version source found (CHANGELOG.md or git tags). Skipping update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Update version in cmd/api/main.go
        if: steps.resolve_version.outputs.skip != 'true'
        run: |
          sed -i "s/const version = \".*\"/const version = \"${{ steps.resolve_version.outputs.version }}\"/" cmd/api/main.go

      - name: Create pull request with version update
        if: steps.resolve_version.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update api version to ${{ steps.resolve_version.outputs.version }}"
          title: "chore: update api version to ${{ steps.resolve_version.outputs.version }}"
          body: |
            This PR was created automatically to keep cmd/api/main.go version
            in sync with the latest release version.
            Version source priority:
            1) CHANGELOG.md
            2) latest semantic git tag
          branch: "chore/update-api-version-${{ steps.resolve_version.outputs.version }}"
          base: main
          add-paths: |
            cmd/api/main.go
          delete-branch: true
