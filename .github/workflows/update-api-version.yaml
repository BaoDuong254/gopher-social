name: Update Version and Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract latest version from CHANGELOG.md
        id: get_version
        run: |
          VERSION=$(grep -oP '\[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -1)
          if [ -z "$VERSION" ]; then
            echo "No semantic version found in CHANGELOG.md"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version in cmd/api/main.go
        run: |
          sed -i "s/const version = \".*\"/const version = \"${{ steps.get_version.outputs.version }}\"/" cmd/api/main.go

      - name: Create pull request with version update
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update api version to ${{ steps.get_version.outputs.version }}"
          title: "chore: update api version to ${{ steps.get_version.outputs.version }}"
          body: |
            This PR was created automatically to keep cmd/api/main.go version
            in sync with the latest release version from CHANGELOG.md.
          branch: "chore/update-api-version-${{ steps.get_version.outputs.version }}"
          base: main
          add-paths: |
            cmd/api/main.go
          delete-branch: true
